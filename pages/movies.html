    <video id="nhhad" controls style="width:100%; max-width:800px;"></video>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const video = document.getElementById('nhhad');
        const videoSrc = '../mov/nhhad/playlist.m3u8'; // adjust path

        if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(videoSrc);
        hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // Native support (Safari)
        video.src = videoSrc;
        }
    </script>
